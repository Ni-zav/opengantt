services:
  web:
    build:
      context: .
      args:
        VITE_COLLAB_URL: ${VITE_COLLAB_URL:-}
    ports:
      - "8080:8080"
    restart: unless-stopped
  collaboration:
    profiles: ["collaboration"]
    build:
      context: .
      dockerfile: Dockerfile.collab
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080}
      COLLAB_PORT: 1234
      COLLAB_MONITORING_PORT: 1235
    ports:
      - "1234:1234"
      - "127.0.0.1:1235:1235"
    restart: unless-stopped
