services:
  web:
    build:
      context: .
      args:
        VITE_COLLAB_URL: ${VITE_COLLAB_URL:-}
    ports:
      - "8080:8080"
    restart: unless-stopped
  collaboration:
    profiles: ["collaboration"]
    build:
      context: .
      dockerfile: Dockerfile.collab
    environment:
      COLLAB_TOKEN: ${COLLAB_TOKEN:-}
      COLLAB_DATA_DIR: /data
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080}
      COLLAB_PORT: 1234
      COLLAB_MONITORING_PORT: 1235
    volumes:
      - collab-data:/data
    ports:
      - "1234:1234"
      - "127.0.0.1:1235:1235"
    restart: unless-stopped

volumes:
  collab-data:
